<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYSA | Academic Excellence, Research Training & Consulting</title>
  <meta name="description" content="NYSA is a global centre for academic excellence offering research support, professional training, consulting, and capacity-building programs for institutions and professionals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/site-defaults.js"></script>
  <script src="js/firebase-site.js"></script>
  <style>
    :root {
      --yellow: #FFD200;
      --yellow-dark: #E6BC00;
      --yellow-light: #FFF8DC;
      --cream: #FFFBF0;
      --cream-dark: #FFF5E0;
      --dark: #1A1A2E;
      --dark-soft: #2D2D44;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(26, 26, 46, 0.08);
      --shadow-lg: 0 12px 40px rgba(26, 26, 46, 0.12);
      --radius: 12px;
      --radius-lg: 20px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 90px;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body {
      font-family: 'Poppins', 'DM Sans', system-ui, sans-serif;
      color: var(--dark);
      background: var(--white);
      line-height: 1.65;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      position: relative;
    }

    #root,
    main {
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    ul { list-style: none; }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26, 26, 46, 0.06);
      transition: box-shadow var(--transition);
    }
    .header.scrolled { box-shadow: var(--shadow); }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 24px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
    }
    .header-inner .logo {
      justify-self: start;
      cursor: pointer;
    }
    .header-inner .nav-desktop { justify-self: center; }
    .header-inner .header-actions { justify-self: end; }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-img {
      height: 52px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      display: block;
    }
    .footer .logo-img {
      height: 56px;
      max-width: 200px;
    }
    .logo-text h1 {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .logo-text span {
      font-size: 0.7rem;
      color: var(--gray);
      font-weight: 500;
    }
    .nav-desktop {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .nav-desktop a {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--dark-soft);
      transition: color var(--transition);
      position: relative;
    }
    .nav-desktop a:hover { color: var(--dark); }
    .nav-desktop a.active { color: var(--yellow-dark); }
    .nav-desktop a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--yellow);
      transition: width var(--transition);
    }
    .nav-desktop a:hover::after,
    .nav-desktop a.active::after { width: 100%; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all var(--transition);
    }
    .btn-primary {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 4px 16px rgba(245, 197, 24, 0.4);
    }
    .btn-primary:hover {
      background: var(--yellow-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(245, 197, 24, 0.5);
    }
    .btn-outline {
      border: 2px solid var(--dark);
      color: var(--dark);
      background: transparent;
    }
    .btn-outline:hover {
      background: var(--dark);
      color: var(--white);
    }
    .btn-white {
      background: var(--white);
      color: var(--dark);
    }
    .btn-white:hover { transform: translateY(-2px); }
    .btn-dark {
      background: var(--dark);
      color: var(--white);
      border-radius: 50px;
      padding: 14px 28px;
      font-weight: 700;
      width: 100%;
      justify-content: center;
    }
    .btn-dark:hover {
      background: var(--dark-soft);
      transform: translateY(-2px);
    }
    .btn-watch {
      background: var(--white);
      color: var(--dark);
      border: 2px solid rgba(26, 26, 46, 0.12);
      box-shadow: var(--shadow);
      flex: 1;
      justify-content: center;
    }
    .play-circle-sm {
      width: 28px;
      height: 28px;
      background: var(--dark);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 0.55rem;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .btn-view-sm {
      background: var(--yellow);
      color: var(--dark);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn-phone {
      display: none;
      width: 44px;
      height: 44px;
      background: var(--yellow);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(245, 197, 24, 0.45);
    }
    .text-yellow { color: var(--yellow-dark); }
    .title-highlight { color: var(--yellow-dark); }

    .hero-welcome {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--yellow-dark);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-name-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .hero-btns-row { display: none; }
    .hide-mobile-link { display: inline-flex; }
    .hide-mobile-label { display: inline-block; }
    .btn-view-sm { display: none; }

    .mobile-stats-panel { display: none; }
    .desktop-stat-cards { display: flex; }

    .features-strip-wrap { display: none; }
    .features-bar-desktop { display: block; }

    .courses-carousel-wrap { display: none; }
    .courses-grid-desktop { display: grid; }

    .workshops-gallery-section { display: block; }
    .videos-testimonials-section { display: block; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D1D5DB;
      border: none;
      padding: 0;
      transition: all var(--transition);
    }
    .carousel-dot.active {
      width: 24px;
      border-radius: 4px;
      background: var(--yellow);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 44px;
      height: 44px;
      padding: 10px;
      border-radius: 10px;
      transition: background var(--transition);
    }
    .hamburger:hover { background: var(--gray-light); }
    .hamburger span {
      display: block;
      width: 26px;
      height: 3px;
      background: var(--dark);
      border-radius: 2px;
      transition: var(--transition);
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: translateX(-8px); }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

    .mobile-menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      top: 0;
      background: rgba(26, 26, 46, 0.45);
      z-index: 998;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .mobile-menu-overlay.open {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-nav {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      right: 0;
      width: min(320px, 88vw);
      height: 100vh;
      height: 100dvh;
      background: var(--white);
      padding: 88px 24px 32px;
      box-shadow: -8px 0 32px rgba(26, 26, 46, 0.15);
      z-index: 999;
      gap: 4px;
      transform: translateX(100%);
      visibility: hidden;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.35s;
      overflow-y: auto;
    }
    .mobile-nav.open {
      transform: translateX(0);
      visibility: visible;
      pointer-events: auto;
    }
    .mobile-nav a {
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 16px;
      border-radius: var(--radius);
      transition: background var(--transition), color var(--transition);
    }
    .mobile-nav a:hover,
    .mobile-nav a.active {
      background: var(--yellow-light);
      color: var(--dark);
    }
    .mobile-nav .mobile-nav-cta {
      margin-top: 16px;
      width: 100%;
      justify-content: center;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero section — full first screen (reference layout) */
    .hero-section-wrap {
      position: relative;
      background: var(--cream);
      overflow: hidden;
      padding-bottom: 0;
    }
    .hero-section-wrap::before {
      content: '';
      position: absolute;
      width: 420px;
      height: 420px;
      background: rgba(255, 210, 0, 0.15);
      border-radius: 50%;
      top: 120px;
      left: -120px;
      z-index: 0;
    }
    .hero-section-wrap::after {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      background: rgba(255, 210, 0, 0.12);
      border-radius: 45% 55% 60% 40%;
      top: 200px;
      left: 35%;
      z-index: 0;
    }
    .hero-yellow-edge {
      display: none;
    }
    .hero {
      position: relative;
      z-index: 2;
      padding: 110px 24px 100px;
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      min-height: calc(100vh - 80px);
    }
    .hero-content { max-width: 560px; }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      color: var(--dark);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 22px;
      letter-spacing: 0.04em;
      border: 1px solid rgba(26, 26, 46, 0.08);
      box-shadow: 0 2px 12px rgba(26, 26, 46, 0.04);
    }
    .hero-heading {
      font-size: clamp(2.2rem, 4.8vw, 3.5rem);
      font-weight: 900;
      line-height: 1.08;
      margin-bottom: 20px;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }
    .hero-heading .line-dark { color: #1a1a1a; display: block; }
    .hero-heading .line-yellow { color: var(--yellow-dark); display: block; }
    .hero-desc {
      color: #555;
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 32px;
      max-width: 480px;
      font-weight: 400;
    }
    .hero .tagline,
    .hero-values,
    .hero-content > p:not(.hero-desc) { display: none; }
    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }
    .hero-btns .btn-primary {
      padding: 14px 28px;
      font-size: 0.95rem;
      border-radius: 50px;
    }
    .btn-watch-hero {
      background: var(--white);
      color: var(--dark);
      border: 1px solid rgba(26, 26, 46, 0.12);
      box-shadow: 0 4px 16px rgba(26, 26, 46, 0.06);
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all var(--transition);
    }
    .btn-watch-hero:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .btn-watch-hero .play-ring {
      width: 36px;
      height: 36px;
      border: 2px solid var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
    }
    .hero-visual {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      min-height: 480px;
    }
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 210, 0, 0.2);
      z-index: 0;
    }
    .hero-blob-1 { width: 200px; height: 200px; bottom: 80px; left: 10%; }
    .hero-blob-2 {
      width: 140px;
      height: 140px;
      top: 40px;
      right: 20%;
      background: rgba(255, 210, 0, 0.15);
      border-radius: 40% 60% 50% 50%;
    }
    .hero-img-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      margin-right: 40px;
    }
    .hero-img-wrap img {
      width: 100%;
      height: auto;
      max-height: 520px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 20px 40px rgba(26, 26, 46, 0.12));
    }
    .hero-dots {
      position: absolute;
      top: 10%;
      right: 5%;
      width: 100px;
      height: 100px;
      background-image: radial-gradient(var(--yellow) 2px, transparent 2px);
      background-size: 10px 10px;
      opacity: 0.35;
      z-index: 1;
    }
    .stat-cards-unified {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: var(--white);
      border-radius: 16px;
      padding: 22px 20px;
      box-shadow: 0 12px 48px rgba(26, 26, 46, 0.14);
      min-width: 250px;
      animation: float 5s ease-in-out infinite;
    }
    .stat-row-desktop {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .stat-row-desktop:last-child { border-bottom: none; padding-bottom: 0; }
    .stat-row-desktop:first-child { padding-top: 0; }
    .stat-row-icon {
      width: 44px;
      height: 44px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .stat-row-desktop strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 800;
      color: #1a1a1a;
      line-height: 1.3;
    }
    .hero-desc-short { display: none; }
    @keyframes float {
      0%, 100% { transform: translateY(-50%); }
      50% { transform: translateY(calc(-50% - 8px)); }
    }

    /* Features bar — white card overlapping hero bottom */
    .hero-features-float {
      position: relative;
      z-index: 20;
      max-width: 1180px;
      margin: -56px auto 0;
      padding: 0 24px 64px;
    }
    .hero-features-inner {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26, 26, 46, 0.1);
      padding: 28px 36px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
    }
    .features-bar.features-bar-desktop { display: none; }
    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .feature-item h4 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a1a;
    }
    .feature-item p {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.45;
      font-weight: 400;
    }

    /* Sections common — white after hero */
    section { padding: 80px 24px; }
    .section-white {
      background: var(--white) !important;
    }
    #about-preview {
      scroll-margin-top: 92px;
    }
    main > section,
    main > .section-white-block {
      background: var(--white);
    }
    .section-inner { max-width: 1280px; margin: 0 auto; }
    .section-label {
      display: inline-block;
      color: var(--yellow-dark);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .link-arrow {
      font-weight: 700;
      color: var(--dark);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: gap var(--transition);
    }
    .link-arrow:hover { gap: 12px; color: var(--yellow-dark); }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .about-text p { color: var(--gray); margin-bottom: 16px; }
    .about-img {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      background: linear-gradient(145deg, var(--dark) 0%, var(--dark-soft) 100%);
    }
    .about-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }
    .play-btn {
      position: absolute;
      bottom: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--yellow);
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform var(--transition);
    }
    .play-btn:hover { transform: scale(1.05); }
    .play-circle {
      width: 36px;
      height: 36px;
      background: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 0.7rem;
    }

    /* Pillars / Courses grid */
    .courses-scroll,
    .courses-grid-desktop {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    .course-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .course-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }
    .course-card-img {
      height: 140px;
      background: linear-gradient(135deg, var(--yellow-light), var(--yellow));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .course-card-body { padding: 20px; }
    .course-badge {
      width: 36px;
      height: 36px;
      background: var(--yellow);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    .course-card h4 { font-size: 1rem; margin-bottom: 8px; font-weight: 700; }
    .course-card p { font-size: 0.85rem; color: var(--gray); margin-bottom: 12px; line-height: 1.5; }

    /* Popular Courses — section 3 (reference layout) */
    .popular-courses-section {
      background: var(--white);
      padding: 72px 24px 80px;
    }
    .popular-courses-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 36px;

    .popular-courses-grid {

    .popular-courses-scroll {

      padding: 4px 0 8px;
    }
    .popular-courses-scroll::-webkit-scrollbar { display: none; }
    .popular-courses-scroll .popular-course-card {
      flex: 0 0 min(280px, 85vw);

    }

    @media (max-width: 1280px) and (min-width: 1025px) {
      .popular-courses-grid {
        grid-template-columns: repeat(3, 1fr);
      }

    /* Section 4 — Workshops + Photo Gallery */
    .workshops-gallery-section {
      background: var(--white);
      padding: 40px 24px 48px;
    }
    .workshops-gallery-split {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, 34%) 1fr;
      gap: 18px;
      align-items: start;
    }
    .panel-title-yellow {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--yellow-dark);
      margin-bottom: 14px;
      line-height: 1.2;
    }
    .workshops-panel-ref {
      background: #FFF9E1;
      border-radius: 14px;
      padding: 20px 18px 18px;
      display: flex;
      flex-direction: column;
    }
    .workshops-list-ref {
      flex: 1;

      flex-direction: column;

    .workshop-date-ref {

      width: 50px;

    }
    .workshop-date-ref strong {
      display: block;

      font-weight: 800;
      line-height: 1;
      color: #1a1a1a;
    }
    .workshop-date-ref span {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gray);
      margin-top: 4px;
    }
    .workshop-item-ref h5 {
      font-size: 0.88rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .workshop-item-ref .workshop-datetime {
      font-size: 0.72rem;
      color: #666;
      margin-bottom: 5px;
      line-height: 1.35;
    }
    .workshop-item-ref .register-link-ref {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a1a;
      display: inline-flex;

      transition: gap var(--transition), color var(--transition);
    }
    .workshop-item-ref .register-link-ref:hover {
      gap: 8px;
      color: var(--yellow-dark);
    }
    .view-all-workshops {
      margin-top: 12px;
      font-weight: 700;
      font-size: 0.85rem;
      color: #1a1a1a;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition);
    }
    .view-all-workshops:hover { gap: 8px; }

    .gallery-panel-ref {
      background: var(--white);
      border-radius: 14px;
      padding: 20px 18px 18px;

      border: 1px solid rgba(26, 26, 46, 0.06);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .gallery-panel-header {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;

      gap: 8px;
    }
    .gallery-panel-header .panel-title-yellow { margin-bottom: 0; }
    .view-gallery-link {
      font-weight: 700;
      font-size: 0.88rem;
      color: #1a1a1a;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition);
    }
    .view-gallery-link:hover { gap: 8px; color: var(--yellow-dark); }

    .gallery-slider-wrap {

    }
    .gallery-track {

    .gallery-track::-webkit-scrollbar { display: none; }
    .gallery-photo {

    }

    .gallery-nav-btn {
      position: absolute;
      right: 0;
      top: 50%;

      height: 40px;

      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
      box-shadow: 0 4px 16px rgba(255, 210, 0, 0.5);
      z-index: 3;
      transition: transform var(--transition), background var(--transition);
    }
    .gallery-nav-btn:hover {
      transform: translateY(-50%) scale(1.08);
      background: var(--yellow-dark);
    }

    /* Services split */
    .split-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .workshop-card, .gallery-card, .video-card, .testimonial-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow);
      height: 100%;
    }
    .workshop-item {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .workshop-item:last-child { border-bottom: none; }

    .workshop-item h5 { font-size: 0.95rem; margin-bottom: 4px; }
    .workshop-item p { font-size: 0.8rem; color: var(--gray); }

      font-weight: 800;

    }

    /* Section — Videos + Testimonials (after Impact) */
    .videos-testimonials-section {
      background: var(--white);
      padding: 48px 24px 56px;
    }
    .videos-testimonials-split {
      max-width: 1280px;

      display: grid;
      grid-template-columns: 1fr minmax(300px, 32%);

    }
    .videos-panel-ref {

    }

      right: 0;

      height: 90px;

      background-size: 10px 10px;
      opacity: 0.4;

    .videos-panel-header {

    }
    .videos-panel-header .panel-title-yellow { margin-bottom: 0; }
    .view-all-videos-link {
      font-weight: 700;
      font-size: 0.88rem;
      color: #1a1a1a;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition), color var(--transition);
    }
    .view-all-videos-link:hover { gap: 8px; color: var(--yellow-dark); }
    .videos-grid-ref {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      position: relative;
      z-index: 1;
    }
    .video-card-ref { cursor: pointer; }
    .video-card-ref .video-thumb-ref {
      position: relative;
      border-radius: 14px;

    .video-card-ref .video-play-circle-lg {
      width: 52px;

    }
    .video-card-ref:hover .video-play-circle-lg { transform: scale(1.08); }
    .video-card-ref .video-duration {
      position: absolute;

      background: rgba(0, 0, 0, 0.75);

      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .video-card-ref h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .video-card-ref p {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.45;
    }

    .testimonial-panel-ref {
      background: #FFF9E1;
      border-radius: 16px;
      padding: 26px 24px 22px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .testimonial-quote-mark {
      font-size: 3.5rem;

      color: var(--yellow-dark);
      font-weight: 800;
      margin-bottom: 8px;

    }
    .testimonial-panel-ref h3 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 14px;

    .testimonial-text-ref {

      color: #444;

      flex: 1;

      align-items: center;

    }

      height: 48px;

    .testimonial-author-ref strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .testimonial-author-ref span {
      font-size: 0.78rem;
      color: #666;
    }
    .testimonial-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: auto;
    }
    .testimonial-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: none;
      padding: 0;
      background: #D1D5DB;
      cursor: pointer;
      transition: all var(--transition);
    }
    .testimonial-dot.active {
      background: #1a1a1a;
      width: 8px;
    }

    /* Impact counters */
    .impact-section {
      background: var(--white);
    }
    .counters-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    .counter-box {
      background: var(--white);

      box-shadow: var(--shadow);
      transition: transform var(--transition);
    }

    .counter-box .number {

      font-weight: 800;
      color: var(--yellow-dark);
      line-height: 1;
      margin-bottom: 8px;
    }
    .counter-box p { font-size: 0.9rem; color: var(--gray); font-weight: 600; }

    /* CTA banner */
    .cta-banner {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-soft) 100%);
      color: var(--white);
      text-align: center;
      padding: 80px 24px;

    }

      display: flex;

    }

      height: 48px;

      border-radius: var(--radius-lg);

    .form-row select,
    .form-row textarea {

      padding: 12px 16px;

      font-size: 0.95rem;

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {

      border-color: var(--yellow);
    }
    .form-row textarea { min-height: 120px; resize: vertical; }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Footer — full viewport width */
    .footer {
      width: 100%;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      background: var(--yellow);
      padding: 60px 0 0;
      box-sizing: border-box;
    }
    .footer-grid {

      margin: 0 auto;

      box-sizing: border-box;

    .footer-about { font-size: 0.9rem; margin: 16px 0; opacity: 0.9; line-height: 1.6; }
    .social-links { display: flex; gap: 12px; }

      width: 40px;
      height: 40px;
      background: var(--dark);
      color: var(--white);
      border-radius: 50%;

      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      transition: transform var(--transition);

    .footer h4 {
      font-size: 1rem;
      margin-bottom: 20px;
      font-weight: 800;
    }
    .footer ul li { margin-bottom: 10px; }

      opacity: 0.85;

    }

    .newsletter {
      display: flex;
      gap: 0;
      margin-top: 12px;
    }
    .newsletter input {

      font-family: inherit;

    .newsletter button {

      color: var(--white);
      padding: 12px 20px;
      border-radius: 0 50px 50px 0;
      font-weight: 700;
    }
    .footer-bottom {
      width: 100%;
      max-width: 100vw;
      margin: 0;
      background: var(--dark);
      color: var(--white);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      box-sizing: border-box;
    }
    .footer-bottom p { font-size: 0.85rem; opacity: 0.8; }
    .back-top {
      width: 44px;
      height: 44px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--dark);
      transition: transform var(--transition);
    }
    .back-top:hover { transform: translateY(-4px); }

    /* Admin portal modal (logo 12× click) */
    .admin-portal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(10, 10, 20, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .admin-portal-box {
      background: var(--white);

      width: 100%;

      border-radius: 10px;
      font-family: inherit;

    .admin-portal-err { color: #b91c1c; font-size: 0.85rem; margin-bottom: 12px; }

    /* Logo fullscreen (header click) */
    .logo-lightbox {
      position: fixed;
      inset: 0;
      z-index: 10003;
      background: rgba(255, 251, 240, 0.97);

    function useScrollHeader() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return scrolled;
    }

    function useAOS() {

        AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true, offset: 60 });
        return () => AOS.refresh();
      }, []);
    }

    const SiteContentContext = React.createContext(null);
    function useSite() {
      const ctx = React.useContext(SiteContentContext);
      if (!ctx) return window.SITE_DEFAULTS || {};
      return ctx;
    }

    function extractYoutubeId(url) {
      if (!url) return '';
      if (window.NYSA_FIREBASE?.extractYoutubeId) return window.NYSA_FIREBASE.extractYoutubeId(url);
      const m = String(url).match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{6,})/);
      return m ? m[1] : '';
    }

    function YoutubeVideoModal({ url, onClose }) {
      const id = extractYoutubeId(url);
      useEffect(() => {
        if (!url || !id) return undefined;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = '';
          window.removeEventListener('keydown', onKey);
        };
      }, [url, id, onClose]);
      if (!url || !id) return null;
      return (
        <div className="youtube-modal-overlay" role="dialog" aria-modal="true" aria-label="Video player" onClick={onClose}>
          <div className="youtube-modal-inner" onClick={(e) => e.stopPropagation()}>
            <button type="button" className="youtube-modal-close" aria-label="Close video" onClick={onClose}>×</button>
            <div className="youtube-modal-frame">
              <iframe
                src={`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`}
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowFullScreen
              />
            </div>
          </div>
        </div>
      );
    }

    function CourseDetailModal({ course, onClose }) {
      useEffect(() => {
        if (!course) return undefined;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = '';
          window.removeEventListener('keydown', onKey);
        };
      }, [course, onClose]);
      if (!course) return null;
      const bodyText = (course.detail || course.desc || '').trim();
      const hasDownload = !!(course.downloadUrl && String(course.downloadUrl).trim());
      return (
        <div className="course-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="course-modal-title" onClick={onClose}>
          <div className="course-modal-box" onClick={(e) => e.stopPropagation()}>
            <button type="button" className="course-modal-close" aria-label="Close" onClick={onClose}>×</button>
            <div className="course-modal-thumb">
              {course.img ? (
                <img src={course.img} alt={course.title || 'Course'} />
              ) : (
                <div className="course-modal-thumb-placeholder" aria-hidden="true">{course.icon || '📚'}</div>
              )}
              {course.icon && <span className="course-modal-icon-badge" aria-hidden="true">{course.icon}</span>}
            </div>
            <div className="course-modal-body">
              {course.categoryLabel && <span className="course-modal-category">{course.categoryLabel}</span>}
              <h2 id="course-modal-title">{course.title}</h2>
              {(course.modules || course.duration) && (
                <div className="course-modal-meta">
                  {course.modules && <span>📋 {course.modules}</span>}
                  {course.duration && <span>⏱ {course.duration}</span>}
                </div>
              )}
              {bodyText && <p className="course-modal-desc">{bodyText}</p>}
              <div className="course-modal-actions">
                {hasDownload ? (
                  <a
                    href={course.downloadUrl}
                    className="course-modal-download"
                    target="_blank"
                    rel="noopener noreferrer"
                    download
                  >
                    ⬇ Download
                  </a>
                ) : (
                  <p className="course-modal-no-download">Download link will be added soon.</p>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GalleryLightbox({ items, index, setIndex, onClose }) {
      useEffect(() => {
        if (index == null) return undefined;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowLeft') setIndex((i) => (i - 1 + items.length) % items.length);
          if (e.key === 'ArrowRight') setIndex((i) => (i + 1) % items.length);
        };
        window.addEventListener('keydown', onKey);
        return () => {
          document.body.style.overflow = '';
          window.removeEventListener('keydown', onKey);
        };
      }, [index, items.length, onClose, setIndex]);
      if (index == null || !items?.length) return null;
      const photo = items[index];
      const multi = items.length > 1;
      return (
        <div className="media-lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" onClick={onClose}>
          <button type="button" className="media-lightbox-close" aria-label="Close" onClick={onClose}>×</button>
          {multi && (
            <button
              type="button"
              className="media-lightbox-nav prev"
              aria-label="Previous photo"
              onClick={(e) => { e.stopPropagation(); setIndex((i) => (i - 1 + items.length) % items.length); }}
            >
              ‹
            </button>
          )}
          <div className="media-lightbox-content" onClick={(e) => e.stopPropagation()}>
            <img className="media-lightbox-photo" src={photo.img} alt={photo.alt || 'Gallery photo'} />
            {photo.alt && <p className="media-lightbox-caption">{photo.alt}</p>}
            {multi && <span className="media-lightbox-counter">{index + 1} / {items.length}</span>}
          </div>
          {multi && (
            <button
              type="button"
              className="media-lightbox-nav next"
              aria-label="Next photo"
              onClick={(e) => { e.stopPropagation(); setIndex((i) => (i + 1) % items.length); }}
            >
              ›
            </button>
          )}
        </div>
      );
    }

        e.preventDefault();
        const ref = logoClickRef.current;
        ref.count += 1;
        clearTimeout(ref.timer);
        if (ref.count >= 12) {
          ref.count = 0;
          setLogoLightboxOpen(false);
          onAdminTrigger?.();
          return;
        }
        ref.timer = setTimeout(() => { ref.count = 0; }, 2500);
        setLogoLightboxOpen(true);
      };

      useEffect(() => {
        document.body.style.overflow = mobileOpen ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [mobileOpen]);

      useEffect(() => {
        const onResize = () => {
          if (window.innerWidth > 1024) setMobileOpen(false);
        };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, [setMobileOpen]);

      return (
        <>
          {logoLightboxOpen && <LogoLightbox open={logoLightboxOpen} onClose={() => setLogoLightboxOpen(false)} />}
          <header className={`header ${scrolled ? 'scrolled' : ''}`}>
            <div className="header-inner">
              <a href="#" className="logo" onClick={handleLogoClick}>
                <Logo />
              </a>
              <nav className="nav-desktop">
                {NAV_LINKS.map((l) => (
                  <a key={l.id} href="#" className={page === l.id ? 'active' : ''}
                    onClick={(e) => { e.preventDefault(); go(l.id); }}>{l.label}</a>
                ))}
              </nav>
              <div className="header-actions">
                <button className="btn btn-primary header-enquire-btn" onClick={() => go('contact')}>
                  Enquire Now →
                </button>
                <a href="tel:+911234567890" className="btn-phone" aria-label="Call NYSA" onClick={() => setMobileOpen(false)}>📞</a>
                <button
                  type="button"
                  className={`hamburger ${mobileOpen ? 'open' : ''}`}
                  onClick={() => setMobileOpen(!mobileOpen)}
                  aria-label={mobileOpen ? 'Close menu' : 'Open menu'}
                  aria-expanded={mobileOpen}
                >
                  <span /><span /><span />
                </button>
              </div>
            </div>
          </header>
          <div
            className={`mobile-menu-overlay ${mobileOpen ? 'open' : ''}`}
            onClick={() => setMobileOpen(false)}
            aria-hidden="true"
          />
          <nav className={`mobile-nav ${mobileOpen ? 'open' : ''}`} aria-label="Mobile navigation">
            {NAV_LINKS.map((l) => (
              <a
                key={l.id}
                href="#"
                className={page === l.id ? 'active' : ''}
                onClick={(e) => { e.preventDefault(); go(l.id); }}
              >
                {l.label}
              </a>
            ))}
            <button type="button" className="btn btn-primary mobile-nav-cta" onClick={() => go('contact')}>
              Enquire Now →
            </button>
          </nav>
        </>
      );
    }

    function CourseCarousel({ items, onAction }) {
      const scrollRef = useRef(null);
      const [active, setActive] = useState(0);

      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;
        const onScroll = () => {
          const child = el.children[0];
          if (!child) return;
          const gap = 16;
          const step = child.offsetWidth + gap;
          const idx = Math.round(el.scrollLeft / step);
          setActive(Math.max(0, Math.min(idx, items.length - 1)));
        };
        el.addEventListener('scroll', onScroll, { passive: true });
        return () => el.removeEventListener('scroll', onScroll);
      }, [items.length]);

      const goTo = (i) => {
        const el = scrollRef.current;
        const card = el?.children[i];
        if (card) card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      };

      return (
        <div className="courses-carousel-wrap">
          <div className="courses-carousel" ref={scrollRef}>
            {items.map((item, i) => (
              <article key={i} className="course-card-slide">
                <div className="card-thumb">
                  <img src={item.img || IMG.s1} alt={item.title} loading="lazy" />
                  <span className="course-badge-float">{item.icon}</span>
                </div>
                <div className="course-card-body">
                  <h4>{item.title}</h4>
                  <p>{item.desc}</p>
                  <a href="#" className="link-arrow" onClick={(e) => { e.preventDefault(); onAction(); }}>Learn More →</a>
                </div>
              </article>
            ))}
          </div>
          <div className="carousel-dots">
            {items.map((_, i) => (
              <button
                key={i}
                type="button"
                className={`carousel-dot ${active === i ? 'active' : ''}`}
                onClick={() => goTo(i)}
                aria-label={`Go to slide ${i + 1}`}
              />
            ))}
          </div>
        </div>
      );
    }

    function VideoGalleryPage({ setPage }) {
      const site = useSite();
      const allVideos = site.videos || [];
      const vp = site.videoGalleryPage || {};
      const pageStats = vp.stats || [];
      const [filter, setFilter] = useState('all');
      const [pageNum, setPageNum] = useState(1);
      const [videoIndex, setVideoIndex] = useState(null);
      const perPage = 8;
      const openVideoAt = (idx) => setVideoIndex(idx);

      useEffect(() => { AOS.refresh(); }, []);

      let filtered = filter === 'all'
        ? [...allVideos]
        : allVideos.filter((v) => v.category === filter);

      const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
      const safePage = Math.min(pageNum, totalPages);
      const start = (safePage - 1) * perPage;
      const shown = filtered.slice(start, start + perPage);
      const featured = filtered[0];

      const handleFilter = (id) => {
        setFilter(id);
        setPageNum(1);
      };

      return (
        <div className="video-gallery-page">
          {videoIndex !== null && (
            <VideoGalleryLightbox
              videos={filtered}
              index={videoIndex}
              setIndex={setVideoIndex}
              onClose={() => setVideoIndex(null)}
            />
          )}
          <div className="video-gallery-hero">
            <PageBreadcrumbs setPage={setPage} current="Videos" />
            <div className="video-hero-split">
              <div data-aos="fade-right">
                <span className="video-hero-badge">{vp.badge || '▶ Video Gallery'}</span>
                <h1 className="video-hero-title">
                  {vp.title || 'Learning in Action,'}{' '}
                  <span className="highlight">{vp.titleHighlight || 'Success in Motion.'}</span>
                </h1>
                <p className="video-hero-desc">{vp.description}</p>
              </div>
              {featured ? (
                <button
                  type="button"
                  className="video-featured-thumb"
                  data-aos="fade-left"
                  aria-label={`Play featured video: ${featured.title}`}
                  onClick={() => openVideoAt(0)}
                >
                  <img src={featured.img} alt={featured.title} loading="lazy" />
                  <div className="video-play-overlay">
                    <span className="video-play-circle-lg">▶</span>
                  </div>
                </button>
              ) : (
                <div className="video-featured-thumb gallery-empty-slot section-empty-hint" data-aos="fade-left" style={{ borderRadius: 16 }}>
                  Add videos in Admin → Video Gallery Page
                </div>
              )}
            </div>
          </div>

          <div className="video-stats-row">
            {pageStats.map((s, i) => (
              <div key={i} className="gallery-stat-card" data-aos="fade-up" data-aos-delay={i * 60}>
                <span className="gallery-stat-icon" aria-hidden="true">{s.icon}</span>
                <div>
                  <strong>{s.num}</strong>
                  <span>{s.label}</span>
                </div>
              </div>
            ))}
          </div>

          <div className="video-filter-wrap" data-aos="fade-up">
            <div className="gallery-filter-bar" role="tablist" aria-label="Video categories">
              {VIDEO_CATEGORIES.map((cat) => (
                <button
                  key={cat.id}
                  type="button"
                  role="tab"
                  aria-selected={filter === cat.id}
                  className={`gallery-filter-btn${filter === cat.id ? ' active' : ''}`}
                  onClick={() => handleFilter(cat.id)}
                >
                  <span aria-hidden="true">{cat.icon}</span>
                  {cat.label}
                </button>
              ))}
            </div>
          </div>

          <div className="video-gallery-grid-wrap">
            {shown.length === 0 ? (
              <p className="video-empty-state">
                {allVideos.length === 0
                  ? 'No videos yet. Add videos in Admin → Video Gallery Page.'
                  : 'No videos found in this category.'}
              </p>
            ) : (
              <div className="video-gallery-grid">
                {shown.map((v, i) => (
                  <button
                    key={`${v.title}-${i}`}
                    type="button"
                    className="video-gallery-card"
                    data-aos="fade-up"
                    data-aos-delay={(i % 4) * 50}
                    aria-label={`Play ${v.title}`}
                    onClick={() => openVideoAt(start + i)}
                  >
                    <div className="video-thumb-ref">
                      <img src={v.img} alt={v.title} loading="lazy" />
                      <div className="video-play-overlay">
                        <span className="video-play-circle-lg">▶</span>
                      </div>
                      <span className="video-duration">{v.time}</span>
                    </div>
                    <h4>{v.title}</h4>
                    <div className="video-gallery-meta">
                      <span>📅 {v.date}</span>
                      <span>👁 {v.views} Views</span>
                    </div>
                  </button>
                ))}
              </div>
            )}

            {totalPages > 1 && (
              <div className="video-pagination">
                <button
                  type="button"
                  aria-label="Previous page"
                  disabled={safePage === 1}
                  onClick={() => setPageNum((p) => Math.max(1, p - 1))}
                >
                  ←
                </button>
                {Array.from({ length: totalPages }, (_, i) => i + 1).map((n) => (
                  <button
                    key={n}
                    type="button"
                    className={safePage === n ? 'active' : ''}
                    onClick={() => setPageNum(n)}
                    aria-label={`Page ${n}`}
                    aria-current={safePage === n ? 'page' : undefined}
                  >
                    {n}
                  </button>
                ))}
                <button
                  type="button"
                  aria-label="Next page"
                  disabled={safePage === totalPages}
                  onClick={() => setPageNum((p) => Math.min(totalPages, p + 1))}
                >
                  →
                </button>
              </div>
            )}
          </div>

          <div className="video-subscribe-cta">
            <div className="video-subscribe-inner">
              <div style={{ display: 'flex', alignItems: 'center', gap: 20, flex: 1 }}>
                <span className="video-subscribe-icon" aria-hidden="true">▶</span>
                <div className="video-subscribe-text">
                  <h3>{vp.subscribeTitle}</h3>
                  <p>{vp.subscribeText}</p>
                </div>
              </div>
              {vp.subscribeUrl ? (
                <a href={vp.subscribeUrl} className="video-subscribe-btn" target="_blank" rel="noopener noreferrer">
                  {vp.subscribeButton || 'Subscribe Now ▶'}
                </a>
              ) : (
                <button type="button" className="video-subscribe-btn">
                  {vp.subscribeButton || 'Subscribe Now ▶'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function GalleryPage({ setPage }) {

      const [filter, setFilter] = useState('all');
      const [visibleCount, setVisibleCount] = useState(9);

              <div key={i} className="gallery-stat-card" data-aos="fade-up" data-aos-delay={i * 60}>

              {GALLERY_CATEGORIES.map((cat) => (
                <button
                  key={cat.id}
                  type="button"
                  role="tab"
                  aria-selected={filter === cat.id}
                  className={`gallery-filter-btn${filter === cat.id ? ' active' : ''}`}
                  onClick={() => handleFilter(cat.id)}
                >
                  <span aria-hidden="true">{cat.icon}</span>
                  {cat.label}
                </button>
              ))}
            </div>
          </div>

          <div className="gallery-page-grid-wrap">
            <div className="gallery-page-grid">
              {filtered.length === 0 ? (
                <p className="courses-empty-state" style={{ gridColumn: '1 / -1' }}>
                  {gallery.length === 0
                    ? 'No photos yet. Add photos in Admin → Photo Gallery.'
                    : 'No photos in this category.'}
                </p>
              ) : (
                shown.map((photo, i) => (
                <button
                  key={`${photo.img}-${i}`}
                  type="button"
                  className="gallery-grid-item"
                  data-aos="fade-up"
                  data-aos-delay={(i % 3) * 50}
                  onClick={() => setLightboxIndex(i)}
                  aria-label={`View ${photo.alt}`}
                >
                  <img src={photo.img} alt={photo.alt} loading="lazy" />
                </button>
                ))
              )}
            </div>
            {hasMore && (
              <div className="gallery-load-more-wrap">
                <button
                  type="button"
                  className="gallery-load-more-btn"
                  onClick={() => setVisibleCount((n) => n + 6)}

                </button>
              </div>

            <PageBreadcrumbs setPage={setPage} current="Research" />
            <h1>Research & Publications</h1>
            <p>Promoting high-quality scientific output and knowledge dissemination</p>
          </div>
          <div className="content-block" data-aos="fade-up">
            <p>
              Research and knowledge dissemination form the cornerstone of NYSA's mission. The organization promotes high-quality scientific
              output and supports researchers navigating the complex landscape of academic publishing through interdisciplinary collaboration
              and methodological rigor.
            </p>
          </div>
          <section className="inner-page-section section-white">
            <div className="section-inner">
              <span className="section-label">RESEARCH SCOPE</span>
              <h2 className="section-title" style={{ marginBottom: 24 }}>Research Domains</h2>
              <div className="research-domains-grid">
                {RESEARCH_DOMAINS.map((d, i) => (
                  <article key={i} className="course-card" data-aos="fade-up" data-aos-delay={i * 50}>
                    <div className="course-card-body">
                      <h4>{d.title}</h4>
                      <p>{d.desc}</p>
                    </div>
                  </article>
                ))}
              </div>
            </div>
          </section>
          <section className="inner-page-section alt-bg section-white">
            <div className="section-inner" style={{ maxWidth: 800 }}>
              <span className="section-label">PUBLICATION SUPPORT</span>
              <h2 className="section-title" style={{ marginBottom: 24 }}>Scientific Writing Services</h2>
              <div className="workshop-card">
                <Accordion items={PUBLICATION_ITEMS} />
              </div>
            </div>
          </section>
          <div className="content-block">
            <h2 className="section-title">Knowledge Contributions</h2>
            <ul className="service-list" style={{ maxWidth: 600 }}>
              <li>Technical reports and policy briefs</li>
              <li>Training modules and conference proceedings</li>
              <li>Research publication support and dissemination</li>
            </ul>
            <div className="cta-banner page-cta-inline" data-aos="zoom-in">
              <h2>Collaborate With NYSA</h2>
              <p>Advance research excellence and participate in a global knowledge network.</p>
              <button className="btn btn-white" onClick={() => setPage('contact')}>Submit Your Work →</button>
            </div>
          </div>
        </>
      );
    }

    function ContactPage({ setPage }) {
      const site = useSite();
      const contact = site.contact || {};
      return (
        <>
          <div className="page-hero">
            <PageBreadcrumbs setPage={setPage} current="Contact Us" />
            <h1>Contact Us</h1>
            <p>We respond to all inquiries within 24–48 hours</p>
          </div>
          <section>
            <div className="section-inner contact-grid">
              <div data-aos="fade-right">
                <span className="section-label">GET IN TOUCH</span>
                <h2 className="section-title">Let's Connect</h2>
                <div className="contact-info-item">
                  <div className="contact-icon">📧</div>
                  <div>
                    <strong>Email</strong>
                    <p style={{ color: 'var(--gray)' }}>{contact.email}</p>
                  </div>
                </div>
                <div className="contact-info-item">
                  <div className="contact-icon">🌐</div>
                  <div>
                    <strong>Website</strong>
                    <p style={{ color: 'var(--gray)' }}>{contact.website}</p>
                  </div>
                </div>
                <div className="contact-info-item">
                  <div className="contact-icon">📍</div>
                  <div>
                    <strong>Address</strong>
                    <p style={{ color: 'var(--gray)' }}>{contact.address}</p>
                  </div>
                </div>
              </div>
              <ContactForm />
            </div>
          </section>
        </>
      );
    }

    function App() {
      const [page, setPage] = useState('home');
      const [mobileOpen, setMobileOpen] = useState(false);
      const [siteContent, setSiteContent] = useState(null);
      const [adminModal, setAdminModal] = useState(false);
      useAOS();

      useEffect(() => {
        if (window.NYSA_FIREBASE?.loadSiteContent) {
          window.NYSA_FIREBASE.loadSiteContent().then(setSiteContent);
        } else {
          setSiteContent(window.SITE_DEFAULTS || {});
        }
      }, []);

      useEffect(() => {
        AOS.refresh();
      }, [page, siteContent]);

      if (!siteContent) {
        return <div className="site-loading">Loading NYSA...</div>;
      }

      const renderPage = () => {
        switch (page) {
          case 'about': return <AboutPage setPage={setPage} />;
          case 'services': return <ServicesPage setPage={setPage} />;
          case 'research': return <ResearchPage setPage={setPage} />;
          case 'gallery': return <GalleryPage setPage={setPage} />;
          case 'videos': return <VideoGalleryPage setPage={setPage} />;
          case 'courses': return <CoursesPage setPage={setPage} />;
          case 'contact': return <ContactPage setPage={setPage} />;
          default: return <HomePage setPage={setPage} />;
        }
      };

      return (
        <SiteContentContext.Provider value={siteContent}>
          <AdminPortalModal open={adminModal} onClose={() => setAdminModal(false)} />
          <Header
            page={page}
            setPage={setPage}
            mobileOpen={mobileOpen}
            setMobileOpen={setMobileOpen}
            onAdminTrigger={() => setAdminModal(true)}
          />
          <main>{renderPage()}</main>
          <Footer setPage={setPage} />
        </SiteContentContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
